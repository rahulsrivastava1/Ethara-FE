services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${PORT:-3000}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:8000}
      NGINX_ENVSUBST_FILTER: API_UPSTREAM
    extra_hosts:
      - "host.docker.internal:host-gateway"
